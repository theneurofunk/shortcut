<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CryptoAssistant</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #050505;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      text-align: center;
    }
    main {
      width: min(440px, 100%);
    }
    .icon {
      width: 88px;
      height: 88px;
      margin: 0 auto 24px;
      display: grid;
      place-items: center;
      border-radius: 24px;
      background: linear-gradient(145deg, #f7931a, #627eea);
      font-size: 42px;
      font-weight: 800;
    }
    h1 {
      margin: 0 0 10px;
      font-size: 34px;
      line-height: 1.05;
    }
    p {
      margin: 0 0 26px;
      color: #a1a1a6;
      font-size: 17px;
      line-height: 1.45;
    }
    a {
      display: block;
      width: 100%;
      margin-top: 12px;
      padding: 16px 18px;
      border-radius: 14px;
      text-decoration: none;
      font-size: 17px;
      font-weight: 700;
    }
    .primary {
      background: #0a84ff;
      color: #fff;
    }
    .secondary {
      background: #1c1c1e;
      color: #0a84ff;
    }
    .note {
      margin-top: 22px;
      color: #6f6f75;
      font-size: 13px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <main>
    <div class="icon">₿Ξ</div>
    <h1>CryptoAssistant</h1>
    <p>Курс Bitcoin в рублях через CoinGecko.</p>
    <a class="primary" href="https://www.icloud.com/shortcuts/5c30e52c92e04a8f91e635714ffc1590">Установить shortcut</a>
    <a class="secondary" href="./CryptoAssistant.html">Открыть веб-версию BTC/ETH</a>
    <a class="secondary" href="https://uncensored-mauve.vercel.app/api/btc">Открыть API</a>
    <div class="note">
      API обрабатывает курс на сервере, а команда на iPhone только показывает готовый ответ.
    </div>
  </main>
</body>
</html>
