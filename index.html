<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoAssistant</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #000;
            color: #fff;
            text-align: center;
            padding: 20px;
        }
        .icon { font-size: 64px; margin-bottom: 20px; }
        h1 { font-size: 28px; margin-bottom: 8px; }
        p { color: #8e8e93; margin-bottom: 30px; }
        .btn {
            display: inline-block;
            padding: 16px 40px;
            background: #0a84ff;
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
        }
        .hint { margin-top: 20px; font-size: 13px; color: #48484a; }
    </style>
</head>
<body>
    <div class="icon">₿Ξ</div>
    <h1>CryptoAssistant</h1>
    <p>Курсы BTC и ETH в рублях</p>
    <a class="btn" href="crypto-courses.shortcut">Установить shortcut</a>
    <div class="hint">Нажмите кнопку → "Открыть" в Shortcuts</div>

    <script>
        // Авто-скачивание
        window.addEventListener('load', () => {
            const a = document.createElement('a');
            a.href = 'crypto-courses.shortcut';
            a.download = 'crypto-courses.shortcut';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        });
    </script>
</body>
</html>
