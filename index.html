<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CryptoAssistant</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #000;
            color: #fff;
            text-align: center;
            padding: 20px;
        }
        .icon { font-size: 64px; margin-bottom: 20px; }
        h1 { font-size: 28px; margin-bottom: 8px; }
        p { color: #8e8e93; margin-bottom: 30px; }
        .btn {
            display: inline-block;
            padding: 16px 40px;
            background: #0a84ff;
            color: #fff;
            text-decoration: none;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
        }
        .btn2 {
            display: inline-block;
            padding: 12px 30px;
            background: #2c2c2e;
            color: #0a84ff;
            text-decoration: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            margin-top: 12px;
        }
        .hint { margin-top: 20px; font-size: 13px; color: #48484a; }
        .hint2 { margin-top: 10px; font-size: 12px; color: #636366; line-height: 1.6; max-width: 300px; }
    </style>
</head>
<body>
    <div class="icon">₿Ξ</div>
    <h1>CryptoAssistant</h1>
    <p>Курсы BTC и ETH в рублях</p>
    <a class="btn" href="shortcuts://import-workflow?name=%D0%9A%D1%80%D0%B8%D0%BF%D1%82%D0%BE%D0%BA%D1%83%D1%80%D1%81%D1%8B&workflow=https://theneurofunk.github.io/shortcut/crypto-courses.shortcut">Установить shortcut</a>
    <br>
    <a class="btn2" href="https://theneurofunk.github.io/shortcut/crypto-courses.shortcut">Скачать файл</a>
    <div class="hint">Нажмите кнопку → откроется Shortcuts → "Добавить shortcut"</div>
    <div class="hint2">Если не работает — скачайте файл через "Файлы" → найдите crypto-courses.shortcut → "Поделиться" → Shortcuts</div>
    <script>
        setTimeout(() => { window.location.href = 'shortcuts://import-workflow?name=%D0%9A%D1%80%D0%B8%D0%BF%D1%82%D0%BE%D0%BA%D1%83%D1%80%D1%81%D1%8B&workflow=https://theneurofunk.github.io/shortcut/crypto-courses.shortcut'; }, 500);
    </script>
</body>
</html>
